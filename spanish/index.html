<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Native Spanish Pro v4.1</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc;
            color: #0f172a;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
        }

        /* Animations */
        .slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .scale-in { animation: scaleIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        .pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        .shimmer {
            background: linear-gradient(90deg, #f0f9ff 0%, #e0f2fe 50%, #f0f9ff 100%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .btn-press { transition: transform 0.1s, background-color 0.2s; }
        .btn-press:active { transform: scale(0.97); }

        /* Sentence Chip Styling */
        .sentence-chip {
            transition: all 0.2s ease;
            border: 2px solid transparent;
        }
        .sentence-chip.selected {
            background-color: #e0e7ff; 
            border-color: #6366f1; 
            color: #312e81; 
            box-shadow: 0 2px 4px rgba(99, 102, 241, 0.1);
        }
        .sentence-chip.unselected {
            background-color: #ffffff;
            border-color: #f1f5f9;
            color: #64748b;
        }

        textarea::-webkit-scrollbar { width: 6px; }
        textarea::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 3px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useLayoutEffect } = React;

        // --- Utils ---
        function pcmToWav(pcmData, sampleRate = 24000) {
            const buffer = new ArrayBuffer(44 + pcmData.length * 2);
            const view = new DataView(buffer);
            const writeString = (view, offset, string) => {
                for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
            };
            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + pcmData.length * 2, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(view, 36, 'data');
            view.setUint32(40, pcmData.length * 2, true);
            for (let i = 0; i < pcmData.length; i++) view.setInt16(44 + i * 2, pcmData[i], true);
            return new Blob([view], { type: 'audio/wav' });
        }

        const splitIntoSentences = (text) => {
            if (!text) return [];
            const cleaned = text.replace(/\n+/g, ' ').replace(/\s+/g, ' ').trim();
            try {
                const segmenter = new Intl.Segmenter('es', { granularity: 'sentence' });
                return Array.from(segmenter.segment(cleaned))
                    .map(s => s.segment.trim())
                    .filter(s => s.length > 1 && !/^\d+$/.test(s));
            } catch (e) {
                return cleaned.match(/[^.!?]+[.!?]+["']?|[^.!?]+$/g)
                    ?.map(s => s.trim())
                    .filter(s => s.length > 1) || [cleaned];
            }
        };

        // --- Safe Icon Component to prevent Crash ---
        const Icon = ({ name, className }) => {
            return (
                <span className={className} dangerouslySetInnerHTML={{
                    __html: `<i data-lucide="${name}"></i>` 
                }} />
            );
        };

        const App = () => {
            const [apiKey, setApiKey] = useState('');
            const [hasKey, setHasKey] = useState(false);
            const [step, setStep] = useState('home'); 
            const [rawSentences, setRawSentences] = useState([]);
            const [selectedIndices, setSelectedIndices] = useState(new Set());
            const [finalText, setFinalText] = useState('');
            const [audioUrl, setAudioUrl] = useState(null);
            
            // Loading states
            const [loading, setLoading] = useState(false); 
            const [loadingMsg, setLoadingMsg] = useState('');
            const [isPolishing, setIsPolishing] = useState(false);

            const [error, setError] = useState('');

            const cameraInputRef = useRef(null);
            const galleryInputRef = useRef(null);

            useEffect(() => {
                const k = localStorage.getItem('gemini_api_key');
                if (k) { setApiKey(k); setHasKey(true); }
            }, []);

            // Critical: Refresh icons whenever DOM updates
            useEffect(() => {
                lucide.createIcons();
            }, [step, loading, audioUrl, error, isPolishing, selectedIndices, rawSentences]);

            // --- Handlers ---

            const handleImageChange = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setAudioUrl(null);
                setError('');
                setLoading(true);
                setLoadingMsg('사진을 준비하고 있어요...');

                setTimeout(async () => {
                    try {
                        setLoadingMsg('이미지에서 텍스트를 추출하는 중...');
                        
                        const reader = new FileReader();
                        reader.onloadend = async () => {
                            try {
                                const base64 = reader.result.split(',')[1];
                                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                                
                                const response = await fetch(url, {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({
                                        contents: [{
                                            parts: [
                                                { text: "Extract all Spanish text from this image. Ignore headers, footers, and page numbers. Correct any obvious OCR errors. Return only the raw Spanish text blocks." },
                                                { inlineData: { mimeType: file.type, data: base64 } }
                                            ]
                                        }]
                                    })
                                });

                                const data = await response.json();
                                if (!response.ok) throw new Error(data.error?.message || "Vision API Error");
                                
                                const extracted = data.candidates?.[0]?.content?.parts?.[0]?.text;
                                if (!extracted) throw new Error("이미지에서 스페인어 텍스트를 찾을 수 없습니다.");

                                const sentences = splitIntoSentences(extracted);
                                if (sentences.length === 0) throw new Error("유효한 문장을 추출하지 못했습니다.");

                                setRawSentences(sentences);
                                setSelectedIndices(new Set(sentences.map((_, i) => i))); 
                                setStep('selection');
                            } catch (innerErr) {
                                setError(innerErr.message);
                            } finally {
                                setLoading(false);
                            }
                        };
                        reader.readAsDataURL(file);
                    } catch (err) {
                        setError(err.message);
                        setLoading(false);
                    }
                }, 100);
            };

            const toggleSentence = (index) => {
                // Using functional update for safety
                setSelectedIndices(prev => {
                    const newSet = new Set(prev);
                    if (newSet.has(index)) newSet.delete(index);
                    else newSet.add(index);
                    return newSet;
                });
            };

            const confirmSelection = () => {
                const merged = rawSentences
                    .filter((_, i) => selectedIndices.has(i))
                    .join(' ');
                setFinalText(merged);
                setStep('editor');
                setAudioUrl(null);
            };

            const polishText = async () => {
                if (!finalText.trim()) return;
                setIsPolishing(true);
                setAudioUrl(null);

                try {
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [{ text: `
                                    Act as a professional Spanish editor. 
                                    I have a text extracted via OCR that may contain typos, broken words, or awkward phrasing.
                                    
                                    Please:
                                    1. Correct spelling and grammar errors.
                                    2. Fix broken words (e.g., "ca sa" -> "casa").
                                    3. Ensure natural sentence flow.
                                    4. Do NOT add any introductory or concluding remarks. Just return the polished Spanish text.

                                    Input text:
                                    "${finalText}"
                                ` }]
                            }]
                        })
                    });

                    const data = await response.json();
                    if (!response.ok) throw new Error(data.error?.message);

                    const polished = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (polished) {
                        setFinalText(polished);
                    }
                } catch (err) {
                    setError("문장 다듬기 실패: " + err.message);
                } finally {
                    setIsPolishing(false);
                }
            };

            const generateAudio = async () => {
                if (!finalText.trim()) return;
                setLoading(true);
                setLoadingMsg('원어민 목소리를 생성하는 중...');
                setAudioUrl(null);
                setError('');

                try {
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`;
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Read this Spanish text naturally and clearly: "${finalText}"` }] }],
                            generationConfig: {
                                responseModalities: ["AUDIO"],
                                speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "achird" } } }
                            }
                        })
                    });

                    const data = await response.json();
                    if (!response.ok) throw new Error(data.error?.message);

                    const audioBase64 = data.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                    if (!audioBase64) throw new Error("오디오 생성에 실패했습니다.");

                    const binaryString = atob(audioBase64);
                    const len = binaryString.length;
                    const pcmData = new Int16Array(len / 2);
                    for (let i = 0; i < len; i += 2) {
                        pcmData[i / 2] = (binaryString.charCodeAt(i + 1) << 8) | binaryString.charCodeAt(i);
                    }
                    
                    setAudioUrl(URL.createObjectURL(pcmToWav(pcmData, 24000)));
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            // --- Views ---

            if (!hasKey) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-slate-50 fade-in">
                        <div className="w-full max-w-sm bg-white p-8 rounded-3xl shadow-xl text-center border border-slate-100">
                            <div className="w-16 h-16 bg-indigo-100 rounded-2xl flex items-center justify-center mx-auto mb-6">
                                <Icon name="key" className="text-indigo-600" />
                            </div>
                            <h2 className="text-2xl font-bold text-slate-900 mb-2">API Key가 필요해요</h2>
                            <p className="text-slate-500 mb-6 text-sm leading-relaxed">
                                Google Gemini API Key를 입력해주세요.<br/>키는 사용자의 브라우저에만 저장됩니다.
                            </p>
                            <input
                                type="password"
                                placeholder="AIzaSy..."
                                className="w-full bg-slate-100 border-2 border-transparent p-4 rounded-xl mb-4 text-center outline-none focus:border-indigo-500 focus:bg-white transition-all font-mono text-sm"
                                value={apiKey}
                                onChange={e => setApiKey(e.target.value)}
                            />
                            <button 
                                onClick={() => {if(apiKey.length>10){localStorage.setItem('gemini_api_key', apiKey); setHasKey(true); setError('');} else {setError('유효한 API Key를 입력해주세요.');}}} 
                                className="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl hover:bg-indigo-700 transition-colors btn-press shadow-lg shadow-indigo-200"
                            >
                                시작하기
                            </button>
                            {error && <p className="text-red-500 text-xs mt-3">{error}</p>}
                        </div>
                    </div>
                );
            }

            if (loading) {
                return (
                    <div className="fixed inset-0 bg-white/95 backdrop-blur-sm z-50 flex flex-col items-center justify-center p-8 text-center fade-in">
                        <div className="relative mb-8">
                            <div className="w-20 h-20 border-4 border-indigo-100 rounded-full animate-spin"></div>
                            <div className="w-20 h-20 border-4 border-t-indigo-600 rounded-full animate-spin absolute top-0 left-0"></div>
                            <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 animate-pulse">
                                <Icon name="loader-2" className="text-indigo-600" />
                            </div>
                        </div>
                        <h3 className="text-xl font-bold text-slate-800 mb-2">{loadingMsg}</h3>
                        <p className="text-slate-500 text-sm">잠시만 기다려주세요...</p>
                    </div>
                );
            }

            return (
                <div className="min-h-screen max-w-md mx-auto bg-white shadow-2xl relative flex flex-col overflow-hidden">
                    
                    <header className="px-6 py-4 flex justify-between items-center bg-white/80 backdrop-blur-md border-b border-slate-100 sticky top-0 z-30">
                        {step === 'home' ? (
                            <div className="font-extrabold text-xl flex items-center gap-2 text-slate-900">
                                <span className="text-2xl">🇪🇸</span> Native Pro
                            </div>
                        ) : (
                            <button onClick={() => {
                                if(step==='selection') { setStep('home'); setRawSentences([]); }
                                else if(step==='editor') setStep('selection');
                            }} className="flex items-center gap-1 text-slate-600 hover:text-slate-900 transition-colors font-medium px-2 py-1 -ml-2 rounded-lg hover:bg-slate-100">
                                <Icon name="chevron-left" className="w-5 h-5" /> 뒤로
                            </button>
                        )}
                        <button onClick={() => {if(confirm('API Key를 초기화하시겠습니까?')){localStorage.removeItem('gemini_api_key'); setHasKey(false);}}} className="p-2 rounded-full hover:bg-slate-100 text-slate-400 hover:text-slate-600 transition-colors">
                            <Icon name="settings" className="w-5 h-5" />
                        </button>
                    </header>

                    {error && !loading && (
                        <div className="absolute top-20 left-4 right-4 bg-red-50 text-red-700 p-4 rounded-2xl text-sm flex items-start gap-3 border border-red-100 shadow-lg z-40 scale-in">
                            <Icon name="alert-circle" className="w-5 h-5 shrink-0 mt-0.5" />
                            <div className="flex-1 font-medium">{error}</div>
                            <button onClick={() => setError('')} className="text-red-400 hover:text-red-700">
                                <Icon name="x" className="w-5 h-5" />
                            </button>
                        </div>
                    )}

                    <main className="flex-1 flex flex-col p-6 overflow-y-auto pb-48 overscroll-contain">

                        {step === 'home' && (
                            <div className="flex-1 flex flex-col justify-center gap-6 slide-up">
                                <div className="text-center">
                                    <h2 className="text-3xl font-extrabold text-slate-900 mb-3 leading-tight">어떤 글을<br/>읽어드릴까요?</h2>
                                    <p className="text-slate-500 text-lg">스페인어 문장을 입력해주세요.</p>
                                </div>
                                
                                <div className="grid grid-cols-2 gap-4">
                                    <button 
                                        onClick={() => cameraInputRef.current.click()}
                                        className="aspect-square bg-gradient-to-br from-blue-500 to-indigo-600 rounded-3xl flex flex-col items-center justify-center gap-3 text-white shadow-xl shadow-blue-200 btn-press relative overflow-hidden group"
                                    >
                                        <div className="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
                                        <div className="bg-white/20 p-5 rounded-full backdrop-blur-sm">
                                            <Icon name="camera" className="w-10 h-10" />
                                        </div>
                                        <span className="font-bold text-xl">카메라 촬영</span>
                                    </button>
                                    <button 
                                        onClick={() => galleryInputRef.current.click()}
                                        className="aspect-square bg-white rounded-3xl flex flex-col items-center justify-center gap-3 border-2 border-slate-200 text-slate-700 shadow-sm btn-press group hover:border-indigo-300 hover:bg-indigo-50 transition-all"
                                    >
                                        <div className="bg-slate-100 p-5 rounded-full group-hover:bg-indigo-100 transition-colors">
                                            <Icon name="image" className="w-10 h-10 text-slate-500 group-hover:text-indigo-600 transition-colors" />
                                        </div>
                                        <span className="font-bold text-xl">갤러리 선택</span>
                                    </button>
                                </div>

                                <div className="relative flex py-2 items-center">
                                    <div className="flex-grow border-t border-slate-200"></div>
                                    <span className="flex-shrink mx-4 text-slate-400 text-sm font-medium">또는</span>
                                    <div className="flex-grow border-t border-slate-200"></div>
                                </div>

                                <button 
                                    onClick={() => { setFinalText(''); setStep('editor'); setError(''); }}
                                    className="py-5 bg-white border-2 border-slate-200 rounded-2xl font-bold text-lg text-slate-600 flex items-center justify-center gap-3 shadow-sm hover:bg-slate-50 btn-press hover:border-slate-300 transition-colors"
                                >
                                    <Icon name="keyboard" className="w-6 h-6" />
                                    직접 입력하기
                                </button>

                                <input type="file" ref={cameraInputRef} className="hidden" accept="image/*" capture="environment" onChange={handleImageChange} onClick={e => e.target.value = null} />
                                <input type="file" ref={galleryInputRef} className="hidden" accept="image/*" onChange={handleImageChange} onClick={e => e.target.value = null} />
                            </div>
                        )}

                        {step === 'selection' && (
                            <div className="slide-up">
                                <div className="mb-6">
                                    <h2 className="text-2xl font-bold text-slate-900 mb-2">문장 선택</h2>
                                    <p className="text-slate-500">읽고 싶은 문장을 터치해서 선택하세요.</p>
                                </div>
                                
                                <div className="space-y-4">
                                    {rawSentences.map((s, idx) => (
                                        <div 
                                            key={`sentence-${idx}`}
                                            onClick={() => toggleSentence(idx)}
                                            className={`p-5 rounded-2xl text-lg leading-relaxed cursor-pointer sentence-chip ${selectedIndices.has(idx) ? 'selected' : 'unselected'}`}
                                        >
                                            <div className="flex items-start gap-3">
                                                {/* Safe Icon Wrapper with Key to force re-render safely */}
                                                <div 
                                                    key={`icon-container-${idx}-${selectedIndices.has(idx)}`}
                                                    className={`mt-1 flex-shrink-0 w-6 h-6 rounded-full border-2 flex items-center justify-center transition-colors ${selectedIndices.has(idx) ? 'border-indigo-500 bg-indigo-500 text-white' : 'border-slate-300'}`}
                                                >
                                                    {selectedIndices.has(idx) && <Icon name="check" className="w-4 h-4" />}
                                                </div>
                                                <p>{s}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {step === 'editor' && (
                            <div className="flex flex-col h-full slide-up">
                                <div className="flex justify-between items-end mb-4">
                                    <label className="text-lg font-bold text-slate-900">최종 텍스트 확인</label>
                                    <button 
                                        onClick={polishText}
                                        disabled={isPolishing || !finalText.trim()}
                                        className={`flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-bold transition-all
                                            ${isPolishing 
                                                ? 'bg-slate-100 text-slate-400 cursor-not-allowed' 
                                                : 'bg-gradient-to-r from-purple-500 to-indigo-500 text-white shadow-md hover:shadow-lg active:scale-95'
                                            }`}
                                    >
                                        {isPolishing ? (
                                            <>
                                                <Icon name="loader-2" className="w-3 h-3 animate-spin" /> 다듬는 중...
                                            </>
                                        ) : (
                                            <>
                                                <Icon name="sparkles" className="w-3 h-3 text-yellow-200" /> AI 문장 다듬기
                                            </>
                                        )}
                                    </button>
                                </div>
                                
                                <div className={`bg-slate-50 rounded-3xl border-2 border-slate-200 p-1 focus-within:border-indigo-500 focus-within:bg-white transition-all shadow-sm relative flex-1 min-h-[300px] ${isPolishing ? 'shimmer' : ''}`}>
                                    <textarea
                                        className="w-full h-full p-5 text-xl leading-loose outline-none text-slate-800 bg-transparent resize-none placeholder-slate-400"
                                        value={finalText}
                                        onChange={e => setFinalText(e.target.value)}
                                        placeholder="여기에 스페인어 텍스트를 입력하거나 수정하세요."
                                        spellCheck="false"
                                        disabled={isPolishing}
                                    ></textarea>
                                    {finalText && !isPolishing && (
                                        <button onClick={() => setFinalText('')} className="absolute top-4 right-4 p-2 text-slate-400 hover:text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-full transition-colors">
                                            <Icon name="x" className="w-4 h-4" />
                                        </button>
                                    )}
                                    {isPolishing && (
                                        <div className="absolute inset-0 flex items-center justify-center bg-white/50 backdrop-blur-[1px] rounded-3xl">
                                            <div className="bg-white/90 px-4 py-2 rounded-xl shadow-lg border border-slate-100 flex items-center gap-2">
                                                <Icon name="sparkles" className="w-4 h-4 text-purple-500 animate-pulse" />
                                                <span className="text-sm font-semibold text-slate-700">문장을 예쁘게 다듬고 있어요</span>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                    </main>

                    {(step === 'selection' || step === 'editor') && (
                        <div className="fixed bottom-0 left-0 right-0 p-5 bg-white/90 backdrop-blur-lg border-t border-slate-100 z-20 max-w-md mx-auto slide-up">
                            {step === 'selection' && (
                                <button 
                                    onClick={confirmSelection}
                                    disabled={selectedIndices.size === 0}
                                    className={`w-full py-4 rounded-2xl font-bold text-xl shadow-lg flex items-center justify-center gap-3 btn-press transition-all
                                    ${selectedIndices.size === 0 ? 'bg-slate-200 text-slate-400 cursor-not-allowed' : 'bg-indigo-600 text-white shadow-indigo-200 hover:bg-indigo-700'}`}
                                >
                                    {selectedIndices.size}개 문장 선택 완료 <Icon name="arrow-right" className="w-6 h-6" />
                                </button>
                            )}
                            
                            {step === 'editor' && (
                                <div className="space-y-4">
                                    {audioUrl && (
                                        <div className="p-4 bg-indigo-900 rounded-2xl shadow-xl border border-indigo-800 scale-in flex flex-col gap-3">
                                            <div className="flex justify-between items-center">
                                                <span className="text-white font-bold flex items-center gap-2">
                                                    <Icon name="volume-2" className="w-5 h-5 text-green-400 pulse" /> 재생 준비 완료
                                                </span>
                                                <div className="flex gap-2">
                                                    {/* 저장 버튼 추가됨 */}
                                                    <a 
                                                        href={audioUrl} 
                                                        download={`spanish-practice-${Date.now()}.wav`}
                                                        className="flex items-center gap-1 text-indigo-300 hover:text-white text-sm px-3 py-1 rounded-lg hover:bg-white/10 transition-colors"
                                                    >
                                                        <Icon name="download" className="w-4 h-4" />
                                                        <span className="font-medium">저장</span>
                                                    </a>
                                                    <button onClick={() => setAudioUrl(null)} className="text-indigo-300 hover:text-white text-sm px-2 py-1 rounded hover:bg-indigo-800/50 transition-colors">닫기</button>
                                                </div>
                                            </div>
                                            <audio controls className="w-full h-10 invert-[.9] opacity-90" src={audioUrl} autoPlay controlsList="nodownload" />
                                        </div>
                                    )}
                                    <button 
                                        onClick={generateAudio}
                                        disabled={!finalText.trim() || isPolishing}
                                        className={`w-full py-4 rounded-2xl font-bold text-xl shadow-lg flex items-center justify-center gap-3 btn-press transition-all
                                        ${!finalText.trim() || isPolishing ? 'bg-slate-200 text-slate-400 cursor-not-allowed' : 'bg-slate-900 text-white shadow-slate-300 hover:bg-slate-800'}`}
                                    >
                                        {!finalText.trim() ? '텍스트를 입력하세요' : (
                                            <>
                                                <Icon name="play-circle" className="w-6 h-6" />
                                                원어민 목소리로 듣기
                                            </>
                                        )}
                                    </button>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
